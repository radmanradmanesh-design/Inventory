<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --turquoise: #06b6d4; --gold: #e5b822; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--turquoise); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .filter-bar { background: var(--dark); color: white; padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 5px; border: none; min-width: 150px; }
    </style>
</head>
<body>

<div class="filter-bar">
    <select id="catFilter" onchange="updateDashboard()"><option>Category</option></select>
    <select id="subCatFilter" onchange="updateDashboard()"><option>Sub-Category</option></select>
    <select id="userFilter" onchange="updateDashboard()"><option>Operator</option></select>
    <button onclick="location.reload()" style="background: var(--gold); border: none; padding: 5px 15px; cursor: pointer;">Reset</button>
</div>

<div class="dashboard-grid">
    <div class="kpi-card"><h3>Intake Volume</h3><p id="kpi-in" style="font-size: 24px; color: var(--turquoise);">0</p></div>
    <div class="kpi-card"><h3>Outbound Volume</h3><p id="kpi-out" style="font-size: 24px; color: var(--gold);">0</p></div>
    <div class="kpi-card"><h3>Net Balance</h3><p id="kpi-net" style="font-size: 24px; color: var(--dark);">0</p></div>
</div>

<div class="chart-container"><canvas id="mainChart"></canvas></div>

<script>
    const _supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

    async function initDashboard() {
        // ۱. واکشی داده‌های منحصر‌به‌فرد برای منوهای دراپ‌دان (از جدول inventory)
        const { data: invData } = await _supabase.from('inventory').select('category, sub_category');
        // اینجا کد پر کردن دراپ‌دان‌ها قرار می‌گیرد...
        
        updateDashboard();
    }

    async function updateDashboard() {
        // ۲. واکشی لاگ‌های تراکنش
        const { data } = await _supabase.from('transfer_log').select('*');
        
        // ۳. محاسبات منطقی (Intake vs Outbound)
        const intake = data.filter(i => i.qty_transferred > 0);
        const out = data.filter(i => i.qty_transferred < 0);
        
        document.getElementById('kpi-in').innerText = intake.length;
        document.getElementById('kpi-out').innerText = out.length;
        
        // ۴. رسم نمودار حرفه‌ای
        renderCharts(intake, out);
    }

    function renderCharts(inData, outData) {
        // استفاده از Chart.js برای نمایش سه وضعیت
    }

    initDashboard();
</script>
</body>
</html>
