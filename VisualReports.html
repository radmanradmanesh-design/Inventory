<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Inventory Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --turquoise: #06b6d4; --gold: #e5b822; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--turquoise); box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .controls { background: var(--dark); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; color: white; }
        select { padding: 10px; border-radius: 6px; width: 100%; }
        .chart-box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="controls">
    <select id="catSelect" onchange="applyFilters()"><option value="">All Categories</option></select>
    <select id="subCatSelect" onchange="applyFilters()"><option value="">All Sub-Categories</option></select>
    <select id="typeSelect" onchange="applyFilters()"><option value="all">All Transactions</option><option value="Intake">Intake</option><option value="Showroom">Showroom</option></select>
    <input type="date" id="dateSelect" onchange="applyFilters()">
</div>

<div class="dashboard-grid">
    <div class="kpi-card"><h3>Total Intake</h3><p id="kpi-intake" style="font-size: 2em; font-weight: bold;">0</p></div>
    <div class="kpi-card"><h3>Total Showroom</h3><p id="kpi-showroom" style="font-size: 2em; font-weight: bold;">0</p></div>
    <div class="kpi-card"><h3>Net Inventory</h3><p id="kpi-net" style="font-size: 2em; font-weight: bold;">0</p></div>
</div>

<div class="chart-box"><canvas id="mainChart"></canvas></div>

<script>
    const _supabase = supabase.createClient('https://qmurpnbrnmyjdxqjhybz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdXJwbmJybm15amR4cWpoeWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTg1MTMsImV4cCI6MjA5NjgzNDUxM30.077KeCrlx5vyFE3YJtBWdadx6wfe_snxURbl2LZ7_ec');
    let masterData = [];

    async function fetchData() {
        // ۱. واکشی موجودی سیستمی (برای کتگوری‌ها) و لاگ‌ها
        const { data: logs } = await _supabase.from('transfer_log').select('*');
        const { data: items } = await _supabase.from('system_inventory').select('barcode, category, sub_category, item_name');
        
        masterData = logs.map(log => ({
            ...log,
            meta: items.find(i => i.barcode === log.Barcode) || {}
        }));

        // پر کردن داینامیک لیست‌ها
        const cats = [...new Set(items.map(i => i.category))];
        cats.forEach(c => document.getElementById('catSelect').innerHTML += `<option value="${c}">${c}</option>`);
        
        applyFilters();
    }

    function applyFilters() {
        const cat = document.getElementById('catSelect').value;
        const type = document.getElementById('typeSelect').value;
        
        const filtered = masterData.filter(d => 
            (!cat || d.meta.category === cat) && 
            (type === 'all' || d.worker_name.includes(type))
        );

        updateUI(filtered);
    }

    function updateUI(data) {
        document.getElementById('kpi-intake').innerText = data.filter(d => d.qty_transferred > 0).length;
        document.getElementById('kpi-showroom').innerText = data.filter(d => d.qty_transferred < 0).length;
        // رسم چارت و ...
    }

    fetchData();
</script>
</body>
</html>
