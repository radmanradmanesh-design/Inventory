<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <div class="controls">
        <select id="catSelect" onchange="applyFilters()"><option value="">All Categories</option></select>
        <select id="subCatSelect" onchange="applyFilters()"><option value="">All Subcategories</option></select>
        <select id="typeSelect" onchange="applyFilters()"><option value="all">All Types</option><option value="Intake">Intake</option><option value="Showroom">Showroom</option></select>
    </div>
</div>

<div class="card"><canvas id="mainChart"></canvas></div>

<script>
    const _supabase = supabase.createClient('https://qmurpnbrnmyjdxqjhybz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdXJwbmJybm15amR4cWpoeWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTg1MTMsImV4cCI6MjA5NjgzNDUxM30.077KeCrlx5vyFE3YJtBWdadx6wfe_snxURbl2LZ7_ec');
    let logs = [], inventory = [];

    async function init() {
        // فراخوانی با نام‌های دقیق ستون‌های شما
        const { data: logsData } = await _supabase.from('transfer_log').select('*');
        const { data: invData } = await _supabase.from('system_inventory').select('"Barcode", "Category", "Subcategory"');
        
        logs = logsData || [];
        inventory = invData || [];

        // پر کردن دراپ‌دان‌ها با هندل کردن مقادیر null
        const cats = [...new Set(inventory.map(i => i.Category).filter(Boolean))];
        const subCats = [...new Set(inventory.map(i => i.Subcategory).filter(Boolean))];
        
        cats.forEach(c => document.getElementById('catSelect').innerHTML += `<option value="${c}">${c}</option>`);
        subCats.forEach(s => document.getElementById('subCatSelect').innerHTML += `<option value="${s}">${s}</option>`);
        
        applyFilters();
    }

    function applyFilters() {
        const cat = document.getElementById('catSelect').value;
        const sub = document.getElementById('subCatSelect').value;
        const type = document.getElementById('typeSelect').value;

        const filtered = logs.filter(log => {
            const item = inventory.find(i => i.Barcode === log.Barcode);
            return (!cat || item?.Category === cat) && 
                   (!sub || item?.Subcategory === sub) &&
                   (type === 'all' || (log.worker_name && log.worker_name.includes(type)));
        });

        renderChart(filtered);
    }

    function renderChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Intake', 'Showroom'],
                datasets: [{
                    label: 'Transaction Count',
                    data: [data.filter(d => d.qty_transferred > 0).length, data.filter(d => d.qty_transferred < 0).length],
                    backgroundColor: ['#06b6d4', '#e5b822']
                }]
            }
        });
    }

    init();
</script>
</body>
</html>
