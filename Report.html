<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Discrepancy Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f7; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #2d3436; color: #dfe6e9; }
        .controls { margin-bottom: 15px; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        #pagination { margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap; }
        .page-btn { padding: 5px 10px; cursor: pointer; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inventory Discrepancy Report (Total: <span id="total-count">0</span>)</h2>
    <div class="controls">
        <button class="btn" style="background:#0984e3" onclick="processData()">Refresh & Calculate</button>
        <button class="btn" style="background:#00b894" onclick="exportToCSV()">Export Full Excel</button>
    </div>

    <table id="report-table">
        <thead>
            <tr><th>Barcode</th><th>Item Name</th><th>Category</th><th>System</th><th>Warehouse</th><th>Showroom</th><th>Physical Total</th><th>Difference</th></tr>
        </thead>
        <tbody id="report-body"></tbody>
    </table>
    <div id="pagination"></div>
</div>

<script>
    const _supabase = supabase.createClient(
        'https://qmurpnbrnmyjdxqjhybz.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdXJwbmJybm15amR4cWpoeWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTg1MTMsImV4cCI6MjA5NjgzNDUxM30.077KeCrlx5vyFE3YJtBWdadx6wfe_snxURbl2LZ7_ec'
    );
    
    let finalData = [];
    const pageSize = 50;

    async function processData() {
        document.getElementById('report-body').innerHTML = '<tr><td colspan="8">Calculating accurate totals...</td></tr>';
        
        const { data: sysData } = await _supabase.from('system_inventory').select('*');
        const { data: whData } = await _supabase.from('warehouse_inventory').select('*');
        const { data: shData } = await _supabase.from('showroom_inventory').select('*');

        const map = {};

        sysData.forEach(item => {
            map[item.Barcode] = { name: item["Item Name"] || "N/A", cat: item.Category || "N/A", sys: Number(item.Stock || 0), wh: 0, sh: 0 };
        });

        whData.forEach(item => {
            if (item.Attribute && item.Attribute.trim() === 'Grand Total') {
                const bc = item["Row Labels"];
                if (!map[bc]) map[bc] = { name: 'Unknown', cat: 'N/A', sys: 0, wh: 0, sh: 0 };
                let val = String(item.Value || "0").replace(/,/g, '');
                map[bc].wh += Number(val);
            }
        });

        shData.forEach(item => {
            const bc = item.Barcode;
            if (!map[bc]) map[bc] = { name: 'Unknown', cat: 'N/A', sys: 0, wh: 0, sh: 0 };
            map[bc].sh += Number(item.showroom_qty || 0);
        });

        finalData = Object.keys(map).map(bc => {
            const row = map[bc];
            const physical = row.wh + row.sh;
            return { Barcode: bc, Name: row.name, Cat: row.cat, Sys: row.sys, Wh: row.wh, Sh: row.sh, Phys: physical, Diff: physical - row.sys };
        });

        document.getElementById('total-count').textContent = finalData.length;
        renderPage(1);
    }

    function renderPage(page) {
        const start = (page - 1) * pageSize;
        const pageData = finalData.slice(start, start + pageSize);
        document.getElementById('report-body').innerHTML = pageData.map(i => `<tr>
            <td>${i.Barcode}</td><td>${i.Name}</td><td>${i.Cat}</td><td>${i.Sys}</td><td>${i.Wh}</td><td>${i.Sh}</td>
            <td>${i.Phys}</td><td style="color:${i.Diff!==0?'red':'green'}; font-weight:bold;">${i.Diff}</td>
        </tr>`).join('');
        
        const totalPages = Math.ceil(finalData.length / pageSize);
        let pgn = "";
        for(let i=1; i<=totalPages; i++) {
            pgn += `<button class="page-btn" onclick="renderPage(${i})">${i}</button>`;
            if(i >= 20) { pgn += '...'; break; } 
        }
        document.getElementById('pagination').innerHTML = pgn;
    }

    function exportToCSV() {
        if(finalData.length === 0) return;
        let csv = "Barcode,Item Name,Category,System,Warehouse,Showroom,Physical Total,Difference\n";
        finalData.forEach(i => csv += `${i.Barcode},"${String(i.Name).replace(/"/g, '""')}","${String(i.Cat).replace(/"/g, '""')}",${i.Sys},${i.Wh},${i.Sh},${i.Phys},${i.Diff}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'Final_Inventory_Report.csv'; a.click();
    }
</script>
</body>
</html>
