<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Discrepancy Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f7; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #2d3436; color: #dfe6e9; }
        .controls { margin-bottom: 15px; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        #pagination { margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap; }
        .page-btn { padding: 5px 10px; cursor: pointer; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Discrepancy Report (Total: <span id="total-count">0</span>)</h2>
    <div class="controls">
        <button class="btn" style="background:#0984e3" onclick="init()">Refresh Data</button>
        <button class="btn" style="background:#00b894" onclick="exportToCSV()">Export Full Excel</button>
    </div>

    <table id="report-table">
        <thead>
            <tr><th>Barcode</th><th>Item Name</th><th>Category</th><th>Physical Stock</th><th>System Stock</th><th>Difference</th></tr>
        </thead>
        <tbody id="report-body"></tbody>
    </table>
    <div id="pagination"></div>
</div>

<script>
    // کلید و آدرس شما که در کدهای قبلی استفاده کرده بودید
    const _supabase = supabase.createClient(
        'https://qmurpnbrnmyjdxqjhybz.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdXJwbmJybm15amR4cWpoeWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTg1MTMsImV4cCI6MjA5NjgzNDUxM30.077KeCrlx5vyFE3YJtBWdadx6wfe_snxURbl2LZ7_ec'
    );
    
    let globalData = [];
    const pageSize = 50;

    async function init() {
        document.getElementById('report-body').innerHTML = '<tr><td colspan="6">Loading 33,000+ records...</td></tr>';
        let allData = [], from = 0, to = 999, keepFetching = true;

        while (keepFetching) {
            const { data, error } = await _supabase.from('inventory_discrepancy_report').select('*').range(from, to);
            if (error) { alert("Error: " + error.message); break; }
            if (data && data.length > 0) { 
                allData = allData.concat(data); 
                from += 1000; 
                to += 1000; 
            } else { 
                keepFetching = false; 
            }
        }
        globalData = allData;
        document.getElementById('total-count').textContent = globalData.length;
        renderPage(1);
    }

    function renderPage(page) {
        const start = (page - 1) * pageSize;
        const pageData = globalData.slice(start, start + pageSize);
        document.getElementById('report-body').innerHTML = pageData.map(item => `<tr>
            <td>${item.Barcode}</td>
            <td>${item["Item Name"]}</td>
            <td>${item.Category}</td>
            <td>${item["Physical Stock"]}</td>
            <td>${item["System Stock"]}</td>
            <td style="color:${item.Difference !== 0 ? 'red' : 'green'}; font-weight:bold;">${item.Difference}</td>
        </tr>`).join('');
        
        // نمایش دکمه‌های صفحه‌بندی
        const totalPages = Math.ceil(globalData.length / pageSize);
        let pgn = "";
        for(let i=1; i<=totalPages; i++) {
            pgn += `<button class="page-btn" onclick="renderPage(${i})">${i}</button>`;
            if(i >= 20) { pgn += '...'; break; } 
        }
        document.getElementById('pagination').innerHTML = pgn;
    }

    function exportToCSV() {
        if(globalData.length === 0) return;
        let csv = "Barcode,Item Name,Category,Physical Stock,System Stock,Difference\n";
        globalData.forEach(row => {
            csv += `${row.Barcode},"${String(row["Item Name"]).replace(/"/g, '""')}","${String(row.Category).replace(/"/g, '""')}",${row["Physical Stock"]},${row["System Stock"]},${row.Difference}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Full_Inventory_Report.csv';
        a.click();
    }

    init();
</script>
</body>
</html>
