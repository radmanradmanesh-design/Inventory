<!DOCTYPE html>
<html lang="fa" dir="rtl"> 
<head>
    <meta charset="UTF-8">
    <title>Interactive Ground Floor Map</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* تنظیمات پایه */
    body { 
        margin: 0; 
        padding: 16px; 
        background-color: #f4f4f4; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
    }

    /* کانتینر اصلی نقشه */
    #map-container { 
        width: 100%; 
        max-width: 1056px; 
        margin: 0 auto; 
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
        position: relative;
    }

    /* ریسپانسیو کردن نقشه */
    #showroom-map {
        width: 100%;
        height: auto;
        display: block;
    }

    /* استایل هاور */
    path { cursor: pointer; transition: 0.3s; }
    path:hover { filter: brightness(1.1); stroke: #000; stroke-width: 2px; }

    /* پاپ‌آپ ریسپانسیو */
    #info-popup {
        position: absolute;
        top: 20px;
        left: 20px;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 450px;
        max-height: 400px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.98) !important;
        padding: 24px !important;
        border-radius: 20px !important;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25) !important;
        z-index: 1000;
        backdrop-filter: blur(12px);
        direction: ltr !important;
        text-align: left !important;
        box-sizing: border-box;
    }

    /* شبکه بندی محصولات - اصلاح شده */
    #popup-content {
        display: grid;
        grid-template-columns: 1fr; /* حالت پیش‌فرض موبایل */
        gap: 12px;
        margin-top: 15px;
    }

    @media (min-width: 480px) {
        #popup-content {
            grid-template-columns: 1fr 1fr; /* دوتایی برای صفحه بزرگتر */
        }
    }

    /* کارت محصولات */
    .product-card {
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
        padding: 12px !important;
        display: flex;
        flex-direction: column;
        border-left: 4px solid #06b6d4 !important;
        transition: transform 0.2s;
        overflow: hidden; 
        min-width: 0; /* حیاتی برای جلوگیری از شکستن گرید */
        box-sizing: border-box;
    }
    
    .product-card:hover { transform: scale(1.02); background: #eff6ff !important; }

    .label { 
        font-size: 0.7rem; 
        color: #64748b; 
        margin-bottom: 2px; 
        text-transform: uppercase; 
        white-space: nowrap;
    }

    .value { 
        font-weight: bold; 
        font-size: 0.9rem; 
        color: #1e293b; 
        word-wrap: break-word; /* شکستن کلمات طولانی */
        overflow-wrap: break-word;
    }
</style>

    document.addEventListener("DOMContentLoaded", function() {
        // ۱. صبر می‌کنیم تا کل DOM صفحه آماده شود
        const mapElement = document.querySelector('#showroom-map');
        
        // ۲. یک تأخیر بسیار کوتاه (۵۰۰ میلی‌ثانیه) می‌دهیم تا SVG کاملاً رندر شود
        setTimeout(function() {
            if (mapElement) {
                svgPanZoom('#showroom-map', {
                    zoomEnabled: true,
                    controlIconsEnabled: true,
                    fit: true,
                    center: true,
                    minZoom: 0.5,
                    maxZoom: 10
                });
            }
        }, 500); 
    });
</script>
<script>
    // Initialize Supabase
    window.mySupabase = window.supabase.createClient(
        'https://qmurpnbrnmyjdxqjhybz.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdXJwbmJybm15amR4cWpoeWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTg1MTMsImV4cCI6MjA5NjgzNDUxM30.077KeCrlx5vyFE3YJtBWdadx6wfe_snxURbl2LZ7_ec'
    );

    async function updateMapStatus() {
        const { data: inventory, error } = await window.mySupabase.from('showroom_inventory').select('*');

        if (error) {
            console.error("Database Error:", error);
            return;
        }

        // گروه‌بندی داده‌ها
        const groupedData = {};
        inventory.forEach(item => {
            if (!groupedData[item.zone_id]) {
                groupedData[item.zone_id] = [];
            }
            groupedData[item.zone_id].push(item);
        });

        // پردازش شلف‌ها
        Object.keys(groupedData).forEach(zoneId => {
            const shelf = document.getElementById(zoneId);
            if (shelf) {
                const itemsInShelf = groupedData[zoneId];
                shelf.style.cursor = "pointer";

                shelf.onclick = function() {
                    let cardsHtml = ``;
                    let totalQty = 0;

                    itemsInShelf.forEach(i => {
                        const qty = parseInt(i.showroom_qty || i.Showroom_Qty || 0);
                        const barcode = i.Barcode || i.barcode || '---';
                        totalQty += qty;

                        cardsHtml += `
                            <div class="product-card">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <span style="font-size: 0.65rem; color: #64748b;">BARCODE</span>
                                        <div style="font-weight: 700; color: #1e293b;">${barcode}</div>
                                    </div>
                                    <div style="text-align: right;">
                                        <span style="font-size: 0.65rem; color: #64748b;">QTY</span>
                                        <div style="font-weight: 900; color: #059669; font-size: 1.1rem;">${qty}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('popup-title').innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <span>Shelf: ${zoneId}</span>
                            <span style="background: #e2e8f0; color: #1e293b; padding: 2px 10px; border-radius: 6px; font-size: 0.9rem;">
                                Total: ${totalQty}
                            </span>
                        </div>
                    `;
                    
                    document.getElementById('popup-content').innerHTML = cardsHtml;
                    document.getElementById('info-popup').style.display = 'block';
                };
            }
        });
    }

    // اجرای اولیه
    updateMapStatus();

    // بروزرسانی زنده (Real-time)
    window.mySupabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'showroom_inventory' }, () => {
            updateMapStatus();
        })
        .subscribe();
</script>
