<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Store Map</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

#three-container{
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="three-container"></div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js';
import { SVGLoader } from 'https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/loaders/SVGLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    5000
);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document
    .getElementById("three-container")
    .appendChild(renderer.domElement);

// ---------- Lights ----------

const ambient = new THREE.AmbientLight(0xffffff, 2);
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 2);
directional.position.set(200,300,200);
scene.add(directional);

// ---------- Camera ----------

camera.position.set(0,0,800);
camera.lookAt(0,0,0);

// ---------- SVG Loader ----------

const loader = new SVGLoader();

loader.load(

    'store-map.svg',

    function(data){

        const group = new THREE.Group();

        data.paths.forEach(path=>{

            const material = new THREE.MeshStandardMaterial({

                color: path.color || 0x1976d2,

                side: THREE.DoubleSide

            });

            const shapes = SVGLoader.createShapes(path);

            shapes.forEach(shape=>{

                const geometry = new THREE.ShapeGeometry(shape);

                const mesh = new THREE.Mesh(
                    geometry,
                    material
                );

                group.add(mesh);

            });

        });

        // SVG Coordinate System
        group.scale.y *= -1;

        // Center roughly
        group.position.set(0,0,0);

        scene.add(group);

        console.log("SVG Loaded");

    },

    undefined,

    function(error){

        console.error("SVG ERROR:",error);

    }

);

// ---------- Resize ----------

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

// ---------- Animation ----------

function animate(){

    requestAnimationFrame(animate);

    renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
